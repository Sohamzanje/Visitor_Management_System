<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visitor Management System</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="container">
        <header class="visitor-header">
            <h1>Visitor Registration</h1>
            <a href="login.html" class="back-link">← Back to Login</a>
        </header>
        
        <form id="visitorForm">
            <div class="form-row">
                <div class="form-group">
                    <label for="name">Full Name *</label>
                    <input type="text" id="name" placeholder="Enter visitor name" required>
                </div>
                <div class="form-group">
                    <label for="phone">Phone Number *</label>
                    <input type="tel" id="phone" placeholder="Enter phone number" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="email">Email *</label>
                    <input type="email" id="email" placeholder="Enter email" required>
                </div>
                <div class="form-group">
                    <label for="company">Company Name</label>
                    <input type="text" id="company" placeholder="Enter company name">
                </div>
            </div>
            <input type="hidden" id="visitorId">

            <div class="form-row">
                <div class="form-group">
                    <label for="purpose">Purpose of Visit *</label>
                    <select id="purpose" required>
                        <option value="">Select purpose</option>
                        <option value="Meeting">Meeting</option>
                        <option value="Interview">Interview</option>
                        <option value="Delivery">Delivery</option>
                        <option value="Maintenance">Maintenance</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="visitDate">Date of Visit *</label>
                    <input type="date" id="visitDate" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="checkInTime">Check-In Time *</label>
                    <input type="time" id="checkInTime" required readonly>
                </div>
                <div class="form-group">
                    <label for="remarks">Remarks</label>
                    <textarea id="remarks" placeholder="Additional comments"></textarea>
                </div>
            </div>

            <button type="submit" id="submitButton">Add Visitor</button>
            <button type="button" id="cancelEditButton" style="display:none; margin-left: 8px;">Cancel</button>
        </form>

        <h2 style="margin-top: 40px; color: #333;">Visitor Records</h2>
        <table id="visitorTable">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Phone</th>
                    <th>Email</th>
                    <th>Company</th>
                    <th>Purpose</th>
                    <th>Visit Date</th>
                    <th>Check-in Time</th>
                    <th>Remarks</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr class="no-data">
                    <td colspan="9">No visitors yet.</td>
                </tr>
            </tbody>
        </table>
    <script>
        // Redirect to login if accessed directly
        if (!sessionStorage.getItem('fromLogin')) {
            window.location.href = 'login.html';
        }
    </script>
