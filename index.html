<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visitor Management System</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="container">
        <h1>Visitor Management System</h1>
        
        <form id="visitorForm">
            <div class="form-row">
                <div class="form-group">
                    <label for="name">Full Name *</label>
                    <input type="text" id="name" placeholder="Enter visitor name" required>
                </div>
                <div class="form-group">
                    <label for="phone">Phone Number *</label>
                    <input type="tel" id="phone" placeholder="Enter phone number" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="email">Email *</label>
                    <input type="email" id="email" placeholder="Enter email" required>
                </div>
                <div class="form-group">
                    <label for="company">Company Name</label>
                    <input type="text" id="company" placeholder="Enter company name">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="purpose">Purpose of Visit *</label>
                    <select id="purpose" required>
                        <option value="">Select purpose</option>
                        <option value="Meeting">Meeting</option>
                        <option value="Interview">Interview</option>
                        <option value="Delivery">Delivery</option>
                        <option value="Maintenance">Maintenance</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="visitDate">Date of Visit *</label>
                    <input type="date" id="visitDate" required>
                </div>
            </div>

            <div class="form-group">
                <label for="remarks">Remarks</label>
                <textarea id="remarks" placeholder="Additional comments"></textarea>
            </div>

            <button type="submit">Add Visitor</button>
        </form>

        <h2 style="margin-top: 40px; color: #333;">Visitor Records</h2>
        <table id="visitorTable">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Phone</th>
                    <th>Email</th>
                    <th>Company</th>
                    <th>Purpose</th>
                    <th>Visit Date</th>
                    <th>Remarks</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr class="no-data">
                    <td colspan="8">No visitors yet.</td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
